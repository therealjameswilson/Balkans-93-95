    <text x="485" y="320">Sarajevo</text>
    <circle cx="392" cy="230" r="7" fill="#216c70"/>
    <text x="304" y="225">Zagreb</text>
    <circle cx="600" cy="250" r="7" fill="#516d49"/>
    <text x="616" y="255">Belgrade</text>
    <circle cx="535" cy="365" r="7" fill="#a83a3d"/>
    <text x="550" y="371">Srebrenica</text>
    <circle cx="325" cy="398" r="7" fill="#b98731"/>
    <text x="230" y="404">Adriatic</text>
