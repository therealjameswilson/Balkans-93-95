    <line x1="74" y1="56" x2="676" y2="56" stroke="#f7f1e4" stroke-width="3" opacity="0.8"/>
    <g fill="#fffdf8" font-family="Inter, Arial, sans-serif">
      <circle cx="74" cy="56" r="9" fill="#e8c16e"/>
      <text x="48" y="91" font-size="15" font-weight="800">1993</text>
      <text x="24" y="30" font-size="13">Options</text>

      <circle cx="290" cy="56" r="9" fill="#e8c16e"/>
      <text x="264" y="91" font-size="15" font-weight="800">1994</text>
      <text x="238" y="30" font-size="13">Contact Group</text>

      <circle cx="506" cy="56" r="9" fill="#e8c16e"/>
      <text x="480" y="91" font-size="15" font-weight="800">1995</text>
      <text x="452" y="30" font-size="13">Crisis to Dayton</text>

      <circle cx="676" cy="56" r="9" fill="#e8c16e"/>
      <text x="650" y="91" font-size="15" font-weight="800">Paris</text>
