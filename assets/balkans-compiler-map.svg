<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">Balkans compiler research map</title>
  <desc id="desc">A stylized map and timeline for FRUS Volume XV source discovery.</desc>
  <defs>
    <linearGradient id="sea" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dcecef"/>
      <stop offset="1" stop-color="#b7d1d5"/>
    </linearGradient>
    <linearGradient id="land" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f1e4"/>
      <stop offset="1" stop-color="#e0d1bc"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#173c5d" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="920" height="620" fill="url(#sea)"/>
  <path d="M0 0H920V620H0Z" fill="#f6f1e7" opacity="0.18"/>
  <path d="M92 0c42 58 84 101 126 128 52 34 89 68 112 103 26 40 24 82-6 128-23 36-21 67 5 93 27 26 61 37 101 35 63-2 103 25 121 82H0V0Z" fill="#9ebfc4" opacity="0.48"/>
  <path d="M315 2c49 44 87 78 116 101 63 49 111 97 145 144 27 38 49 89 66 153 17 63 50 115 98 156 21 18 38 39 51 64H920V0Z" fill="url(#land)"/>
  <path d="M395 32c-8 34-22 64-42 89-17 21-19 45-7 72 9 21 6 39-8 55-18 20-25 44-22 72 4 33 25 55 63 65 25 6 45 20 59 42 11 18 30 28 56 31 38 5 67 21 87 48 22 29 55 46 99 50 29 3 54 14 76 33h164V0H407Z" fill="#eadbc8"/>
  <path d="M430 54c50 45 86 90 108 135 17 34 41 64 72 90 33 27 48 60 47 100-1 41 18 74 56 100 30 20 57 44 81 72" fill="none" stroke="#d2b98e" stroke-width="14" stroke-linecap="round" opacity="0.55"/>
  <path d="M344 146c44 19 82 48 114 87 35 42 73 75 114 99 31 18 61 47 89 87 24 34 58 60 103 78" fill="none" stroke="#f7f1e4" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <g filter="url(#shadow)">
    <rect x="56" y="44" width="274" height="146" rx="8" fill="#fffdf8" stroke="#d7cabb"/>
    <text x="78" y="82" fill="#a83a3d" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">VOLUME XV</text>
    <text x="78" y="116" fill="#18222d" font-family="Georgia, serif" font-size="30" font-weight="700">Wars in the Balkans</text>
    <text x="78" y="146" fill="#5e6872" font-family="Inter, Arial, sans-serif" font-size="16">1993-1995 compiler source map</text>
  </g>

  <g fill="#173c5d" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">
