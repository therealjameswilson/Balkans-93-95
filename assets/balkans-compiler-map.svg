    <text x="18" y="36" fill="#a83a3d" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">SOURCE CLUSTERS</text>
    <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#18222d">
      <circle cx="22" cy="62" r="5" fill="#173c5d"/>
      <text x="36" y="67">NSC folders</text>
      <circle cx="22" cy="88" r="5" fill="#216c70"/>
      <text x="36" y="93">PC/DC summaries</text>
      <circle cx="22" cy="114" r="5" fill="#516d49"/>
      <text x="36" y="119">BTF intelligence</text>
    </g>
